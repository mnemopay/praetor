# Praetor — basic end-to-end demo charter.
#
# Exercises 6 different Praetor packages via the deterministic Executable
# Charters path. No LLM provider, no API keys, no peer deps required.
# Native runtime only.
#
# What it does:
#   1. Scrapes example.com via the native fetch path (with SSRF guard)
#   2. Profiles its GEO surface (extract title, headings, JSON-LD)
#   3. Drafts a 3-step outreach sequence
#   4. Generates an SEO site bundle (sitemap, robots, ai.txt, llms.txt, JSON-LD)
#   5. Stores the page summary in the agent's knowledge base
#   6. Upserts a contact record
#   7. Emits an Article 12 audit bundle for compliance
#
# Run with:
#   node packages/cli/dist/index.js run charters/demo-basic.yaml --article12 ./audit-bundle/
#
# After: check `praetor-out/seo/` for the generated site, `audit-bundle/` for
# the Merkle-rooted Article 12 evidence.

name: praetor-basic-demo
goal: Scrape example.com, profile its GEO surface, draft outreach, emit an SEO mini-site, and seal the audit
budget:
  maxUsd: 0
  approvalThresholdUsd: 0
agents:
  - role: developer
sandbox:
  kind: auto         # probes Docker; falls back to mock
steps:
  # ─── Step 1: scrape the target ─────────────────────────────────────────
  - action: scrape_url
    args:
      url: https://example.com/

  # ─── Step 2: extract the GEO/SEO profile from what we just scraped ─────
  - action: profile_geo_competitor
    args:
      competitorUrl: https://example.com/

  # ─── Step 3: draft a 3-step outreach sequence based on the profile ─────
  - action: geo_outreach_sequence
    args:
      targetSite: https://example.com/
      authorName: Example Author
      niche: example domain reference

  # ─── Step 4: emit a small SEO bundle Praetor would deploy as the reply ─
  - action: generate_seo_site
    args:
      origin: https://praetor-demo.local
      pages:
        - slug: index
          title: "Praetor — basic demo"
          description: "End-to-end Praetor charter demonstrating scrape, profile, outreach, SEO emit, and audit."
          aiDescription: "Basic Praetor mission demo. Native runtime, no LLM, no peer deps."
          bodyMarkdown: "# Praetor basic demo\n\nThis page was generated by a Praetor charter.\nThe charter scraped example.com, profiled its GEO surface, drafted outreach, and emitted this site.\nNo LLM, no peer deps. Pure native runtime."

  # ─── Step 5: remember what we learned in the knowledge base ────────────
  - action: ingest_knowledge
    args:
      text: "Praetor basic demo: scraped example.com, generated outreach sequence, emitted SEO bundle. Charter completed cleanly."
      source: charters/demo-basic.yaml

  # ─── Step 6: upsert a sentinel contact record ──────────────────────────
  - action: upsert_contact
    args:
      email: demo@praetor.local
      name: Praetor Demo
      company: Praetor
      source: basic-demo-charter
      tags:
        - demo
        - end-to-end

outputs:
  - praetor-out/seo/sitemap.xml
  - praetor-out/seo/llms.txt
  - praetor-out/seo/index/index.html

compliance:
  article12: true
