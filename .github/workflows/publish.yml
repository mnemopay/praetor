name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (the part after "@praetor/" — e.g. browser, voice, scrape).'
        required: true
        type: string
      tag:
        description: 'npm dist-tag to publish under. Use "next" for prereleases, "latest" for production.'
        required: false
        type: string
        default: latest

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      # Fail loud if the requested package directory or package.json is missing.
      - name: Verify package exists and is publishable
        run: |
          set -euo pipefail
          PKG="packages/${{ github.event.inputs.package }}/package.json"
          if [ ! -f "$PKG" ]; then
            echo "::error::no package.json at $PKG"
            exit 1
          fi
          # Refuse to publish workspace-private packages by accident.
          if node -p "JSON.parse(require('fs').readFileSync('$PKG','utf8')).private === true" 2>/dev/null | grep -q true; then
            echo "::error::$PKG is marked private; remove \"private\": true to publish"
            exit 1
          fi
          echo "Package OK: $(node -p "require('./$PKG').name")@$(node -p "require('./$PKG').version")"

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Publish to npm
        working-directory: packages/${{ github.event.inputs.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag "${{ github.event.inputs.tag }}"
